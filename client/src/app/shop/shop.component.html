@if(product){
  <div class="container mt-5">
  <div class="row">

    <h1 class="main-title">Shopping</h1>

    <section class="col-md-3">
      <div class="sidebar">

        <h4 class="section-title">Sorting</h4>

        <div class="custom-select-wrapper mb-4">
          <select #sortSelected name="" class="form-select" id="" (change)="sortingByPrice($event)">
            @for (item of SortingOptions; track $index) {
            <option [value]="item.value">{{item.name}}</option>
            }
          </select>
        </div>

        <h4 class="section-title">Categories</h4>
        @for (item of category; track $index) {
        <ul class="list-group custom-list-group">
          <li [class.active]="item.id==productParam.categoryId" (click)="SelectedId(item.id)"
            class="list-group-item custom-list-item">
            {{item.name}}
          </li>
        </ul>
        }

      </div>
    </section>


    <section class="col-md-9">

      <div class="d-flex justify-content-between align-items-center mb-4">

        <div class="paging-container">
          <span class="text-dark">showing {{product.length}} of {{productParam.pageNumber*productParam.pageSize}}</span>
        </div>

        <div class="search-container">
          <div class="input-group search-bar">
            <input #search (keyup)="OnSearch(search.value)" (keyup.enter)="OnSearch(search.value)" type="text" class="form-control" placeholder="Search...">
            <input (click)="OnSearch(search.value)" type="button" class="btn btn-danger" value="Search">
            <input (click)=" ResetValue()" type="button" class="btn btn-dark" value="Reset">
          </div>
        </div>

      </div>


      <div class="row g-4">
        @for (item of product; track $index) {
        <ng-container>
          <app-shop-item class="product-item col-lg-4 col-md-6" [Product]="item"></app-shop-item>
        </ng-container>
        }
      </div>

      <div class="d-flex justify-content-center align-items-center mt-5">

        <app-pagination [pageSize]="productParam.pageSize"
         [totalCount]="totalCount"
         (pageChanged)="OnChangePage($event)"
         ></app-pagination>
      </div>
    </section>

  </div>
</div>

}
