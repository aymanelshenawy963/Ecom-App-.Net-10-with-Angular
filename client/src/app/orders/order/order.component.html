<div class="container mt-5">
  <div class="row">
    <div class="col-12">

      <table class="table custom-table">
        <thead>
          <tr>
            <th>Order</th>
            <th>Image</th>
            <th>Date</th>
            <th>Status</th>
            <th>Total</th>
            <th>Details</th>
          </tr>
        </thead>

        <tbody>
          @for (item of orders; track $index) {
          <tr>

            <td>
              <span class="order-id" [routerLink]="['/orders/item']" [queryParams]="{id:item.id}">
                #{{item.id}}
              </span>
            </td>

            <td>
              <div class="image-container">
                <img (click)="OpenModal(item.orderItems)"
                  src="https://localhost:44361/{{getFirstImageOrderItem(item.orderItems)}}" alt="">

                @if(item.orderItems.length > 1){
                <span class="more-image">
                  +{{item.orderItems.length - 1}}
                </span>
                }
              </div>
            </td>

            <td>
              {{item.orderDate | date}}
            </td>
            <td>
              <span class="btn" [ngClass]="{
                  'btn-pending': item.status === 'Pending',
                  'btn-failed': item.status === 'PaymentFailed',
                  'btn-success': item.status === 'PaymentReceived'
                }">
                {{item.status}}
              </span>
            </td>
            <td>
              {{item.total | currency}}
            </td>

            <td>
              <button class="btn btn-info" [routerLink]="['/orders/item']" [queryParams]="{id:item.id}">
                <i class="fa fa-info"></i>
              </button>
            </td>

          </tr>
          }
        </tbody>

      </table>

    </div>
  </div>
</div>


<!-- Button trigger modal -->
<button type="button" class="btn btn-primary" data-toggle="modal" data-target="#exampleModalCenter">
  Images
</button>

<!-- Modal -->
<div class="modal fade" id="ImageModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalCenterTitle"
  aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <!-- <h5 class="modal-title" id="exampleModalLongTitle">Modal title</h5> -->
        <button (click)="CloseModal()" type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        @for (item of URLImageModal; track $index) {
        <img src="https://localhost:44361/{{item}}" width="400" alt="">
        }
      </div>
      <div class="modal-footer">
        <button (click)="CloseModal()" type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
